<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; padding: 16px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #73726c; margin-bottom: 20px; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  @media (min-width: 500px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .metric { background: #fff; border-radius: 10px; padding: 12px; border: 0.5px solid rgba(0,0,0,0.1); }
  .metric-label { font-size: 11px; color: #73726c; margin-bottom: 4px; }
  .metric-val { font-size: 18px; font-weight: 500; }
  .pos { color: #3B6D11; } .neg { color: #A32D2D; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; margin-bottom: 8px; border-left: 3px solid #d3d1c7; }
  .card.gain { border-left-color: #3B6D11; }
  .card.loss { border-left-color: #A32D2D; }
  .card.flat { border-left-color: #b4b2a9; }
  .card.closed-card { border-left-color: #73726c; opacity: 0.75; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 11px; color: #73726c; margin-top: 2px; }
  .card-pnl-val { font-size: 15px; font-weight: 500; }
  .card-pnl-pct { font-size: 12px; margin-top: 2px; }
  .card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stat-label { font-size: 11px; color: #73726c; }
  .stat-val { font-size: 12px; color: #444441; margin-top: 2px; }
  .card-actions { display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .remove-btn { font-size: 11px; color: #A32D2D; background: none; border: none; cursor: pointer; padding: 0; }
  .close-btn { font-size: 11px; color: #73726c; background: none; border: none; cursor: pointer; padding: 0; }
  .manual-row { display: flex; gap: 6px; align-items: center; }
  .manual-input { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.2); width: 100px; background: #fff; color: #1a1a18; }
  .manual-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; cursor: pointer; color: #1a1a18; }
  .manual-btn:hover { background: #f5f5f0; }
  .section { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: #3d3d3a; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: #73726c; }
  input[type="text"], input[type="number"], select { font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a18; outline: none; }
  .input-sm { width: 90px; } .input-md { width: 120px; } .input-lg { width: 160px; }
  button { font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a18; cursor: pointer; }
  button:hover { background: #f5f5f0; }
  .btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn-primary:hover { background: #3d3d3a; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .status { font-size: 12px; color: #73726c; }
  .error { font-size: 12px; color: #A32D2D; background: #FCEBEB; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: #f1efe8; color: #5f5e5a; margin-left: 4px; vertical-align: middle; }
  .tag.opt { background: #FAEEDA; color: #854F0B; }
  .tag.rh { background: #E6F1FB; color: #185FA5; }
  .tag.ml { background: #EAF3DE; color: #3B6D11; }
  .tag.ctag { background: #f1efe8; color: #73726c; }
  .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.08); margin: 20px 0; }
  .section-label { font-size: 12px; color: #73726c; margin-bottom: 8px; }
  .empty { font-size: 13px; color: #73726c; text-align: center; padding: 24px; }
</style>
</head>
<body>

<h1>Portfolio tracker</h1>
<p class="subtitle">Finnhub live prices &middot; Alpha Vantage fallback &middot; Saves locally</p>

<div class="summary-grid">
  <div class="metric"><div class="metric-label">Total invested</div><div class="metric-val" id="t-inv">—</div></div>
  <div class="metric"><div class="metric-label">Current value</div><div class="metric-val" id="t-val">—</div></div>
  <div class="metric"><div class="metric-label">Gain / loss</div><div class="metric-val" id="t-pnl">—</div></div>
  <div class="metric"><div class="metric-label">Return</div><div class="metric-val" id="t-pct">—</div></div>
</div>

<div class="toolbar">
  <button class="btn-primary" id="rbtn" onclick="fetchAll()">Refresh live prices</button>
  <span class="status" id="stext">Not yet refreshed</span>
</div>
<div class="error" id="ebox"></div>

<div class="section-label" id="pos-label">Open positions</div>
<div id="open-list"></div>

<div id="closed-wrap" style="display:none; margin-top:16px;">
  <div class="section-label">Closed positions</div>
  <div id="closed-list"></div>
</div>

<hr class="divider">

<div class="section">
  <div class="section-title">Add a position</div>
  <div class="form-row">
    <div class="form-group"><label>Ticker</label><input class="input-sm" id="a-tick" type="text" placeholder="AAPL" maxlength="8"/></div>
    <div class="form-group"><label>Name</label><input class="input-lg" id="a-name" type="text" placeholder="Apple Inc."/></div>
    <div class="form-group"><label>Shares</label><input class="input-sm" id="a-shares" type="number" step="0.0001" placeholder="0"/></div>
    <div class="form-group"><label>Cost / share</label><input class="input-sm" id="a-cost" type="number" step="0.01" placeholder="0.00"/></div>
    <div class="form-group"><label>Account</label>
      <select id="a-acct"><option>Merrill Edge IRA</option><option>Robinhood</option><option>Other</option></select>
    </div>
    <div class="form-group"><label>Type</label>
      <select id="a-type"><option value="stock">Stock / ETF</option><option value="option">Option (manual)</option></select>
    </div>
    <div class="form-group" style="justify-content:flex-end;"><button class="btn-primary" onclick="addPos()">Add</button></div>
  </div>
  <div id="a-err" style="font-size:12px;color:#A32D2D;margin-top:8px;display:none;"></div>
</div>

<script>
const AV = 'GC12FPL30GNZKUD8';
const FH = 'KHUcp_SpfC9IXnOHmDbzOLXm7_xrMCwL';
const SK = 'portfolio_v4';

const DEFAULTS = [
  { id:'d1', name:'Delta Air Lines', ticker:'DAL', account:'Merrill Edge IRA', shares:4, costBasis:65.94, currentPrice:69.67, type:'stock', addedDate:'Apr 7, 2026', closed:false },
  { id:'d2', name:'US Global Jets ETF', ticker:'JETS', account:'Merrill Edge IRA', shares:14, costBasis:24.67, currentPrice:26.52, type:'stock', addedDate:'Apr 7, 2026', closed:false },
  { id:'d3', name:'iShares Core S&P 500', ticker:'IVV', account:'Merrill Edge IRA', shares:2, costBasis:659.67, currentPrice:679.14, type:'stock', addedDate:'Apr 7, 2026', closed:false },
  { id:'d4', name:'Invesco QQQ', ticker:'QQQ', account:'Robinhood', shares:0.342393, costBasis:584.12, currentPrice:588.59, type:'stock', addedDate:'Apr 7, 2026', closed:false },
  { id:'d5', name:'CCL $27.50 Call 4/24', ticker:null, account:'Robinhood', shares:1, costBasis:48.00, currentPrice:150.96, type:'option', addedDate:'Apr 7, 2026', closed:true, closedPrice:150.96, closedDate:'Apr 8, 2026' }
];

function load() { try { const s=localStorage.getItem(SK); return s?JSON.parse(s):DEFAULTS; } catch { return DEFAULTS; } }
function save() { try { localStorage.setItem(SK, JSON.stringify(positions)); } catch {} }

let positions = load();

const fmt = n => '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS = n => (n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const fmtSh = p => p.type==='option'?'1 contract':p.shares%1!==0?p.shares.toFixed(4)+' sh':p.shares+' sh';

function renderAll() {
  const open = positions.filter(p=>!p.closed);
  const closed = positions.filter(p=>p.closed);
  let tInv=0, tVal=0;

  document.getElementById('open-list').innerHTML = open.length===0
    ? '<div class="empty">No open positions. Add one below.</div>'
    : open.map(p => {
        const idx = positions.indexOf(p);
        const inv = p.type==='option'?p.costBasis:p.shares*p.costBasis;
        const val = p.type==='option'?p.currentPrice:p.shares*p.currentPrice;
        const pnl = val-inv; const pct=(pnl/inv)*100;
        tInv+=inv; tVal+=val;
        const gc = Math.abs(pnl)<0.005?'flat':pnl>=0?'gain':'loss';
        const pc = pnl>=0?'#3B6D11':'#A32D2D';
        const at = p.account==='Robinhood'?'rh':p.account==='Merrill Edge IRA'?'ml':'';
        return `<div class="card ${gc}">
          <div class="card-top">
            <div>
              <div class="card-name">${p.name} <span style="font-size:12px;font-weight:400;color:#73726c">${p.ticker||'OPT'}</span>${p.type==='option'?'<span class="tag opt">option</span>':''}</div>
              <div class="card-sub"><span class="tag ${at}">${p.account}</span> &middot; Added ${p.addedDate}</div>
            </div>
            <div style="text-align:right">
              <div class="card-pnl-val" style="color:${pc}">${fmtS(pnl)}</div>
              <div class="card-pnl-pct" style="color:${pc}">${fmtP(pct)}</div>
            </div>
          </div>
          <div class="card-stats">
            <div><div class="stat-label">Shares</div><div class="stat-val">${fmtSh(p)}</div></div>
            <div><div class="stat-label">Cost basis</div><div class="stat-val">${p.type==='option'?fmt(p.costBasis)+' paid':fmt(p.costBasis)+' / sh'}</div></div>
            <div><div class="stat-label">Current</div><div class="stat-val">${p.type==='option'?fmt(p.currentPrice):fmt(p.currentPrice)+' / sh'}</div></div>
            <div><div class="stat-label">Total value</div><div class="stat-val">${fmt(val)}</div></div>
          </div>
          <div class="card-actions">
            <div class="manual-row">
              <input class="manual-input" type="number" step="0.01" placeholder="Update price $" id="mp-${idx}"/>
              <button class="manual-btn" onclick="manualUp(${idx})">Update</button>
            </div>
            <button class="close-btn" onclick="closePos(${idx})">Mark closed</button>
            <button class="remove-btn" onclick="removePos(${idx})">Remove</button>
          </div>
        </div>`;
      }).join('');

  if (closed.length>0) {
    document.getElementById('closed-wrap').style.display='block';
    document.getElementById('closed-list').innerHTML = closed.map(p => {
      const idx = positions.indexOf(p);
      const inv = p.type==='option'?p.costBasis:p.shares*p.costBasis;
      const val = p.closedPrice||p.currentPrice;
      const pnl = val-inv; const pct=(pnl/inv)*100;
      const pc = pnl>=0?'#3B6D11':'#A32D2D';
      tInv+=inv; tVal+=val;
      return `<div class="card closed-card">
        <div class="card-top">
          <div>
            <div class="card-name">${p.name} <span style="font-size:12px;font-weight:400;color:#73726c">${p.ticker||'OPT'}</span><span class="tag ctag">closed ${p.closedDate||''}</span></div>
            <div class="card-sub">${p.account} &middot; Added ${p.addedDate}</div>
          </div>
          <div style="text-align:right">
            <div class="card-pnl-val" style="color:${pc}">${fmtS(pnl)}</div>
            <div class="card-pnl-pct" style="color:${pc}">${fmtP(pct)}</div>
          </div>
        </div>
        <div class="card-stats">
          <div><div class="stat-label">Invested</div><div class="stat-val">${fmt(inv)}</div></div>
          <div><div class="stat-label">Closed at</div><div class="stat-val">${fmt(val)}</div></div>
          <div><div class="stat-label">P&L</div><div class="stat-val" style="color:${pc}">${fmtS(pnl)}</div></div>
          <div><div class="stat-label">Return</div><div class="stat-val" style="color:${pc}">${fmtP(pct)}</div></div>
        </div>
        <div class="card-actions"><button class="remove-btn" onclick="removePos(${idx})">Remove</button></div>
      </div>`;
    }).join('');
  } else {
    document.getElementById('closed-wrap').style.display='none';
  }

  const tp=tVal-tInv; const tpct=tInv>0?(tp/tInv)*100:0;
  document.getElementById('t-inv').textContent=fmt(tInv);
  document.getElementById('t-val').textContent=fmt(tVal);
  document.getElementById('t-pnl').className='metric-val '+(tp>=0?'pos':'neg');
  document.getElementById('t-pnl').textContent=fmtS(tp);
  document.getElementById('t-pct').className='metric-val '+(tp>=0?'pos':'neg');
  document.getElementById('t-pct').textContent=fmtP(tpct);
}

function manualUp(idx) {
  const v=parseFloat(document.getElementById('mp-'+idx).value);
  if(isNaN(v)||v<=0)return;
  positions[idx].currentPrice=v;
  save(); renderAll();
}

function closePos(idx) {
  const p=positions[idx];
  const ps=prompt('Closing price for '+p.name+'?');
  const pv=parseFloat(ps);
  if(isNaN(pv)||pv<=0)return;
  positions[idx].closed=true;
  positions[idx].closedPrice=pv;
  const now=new Date();
  positions[idx].closedDate=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  save(); renderAll();
}

function removePos(idx) {
  if(!confirm('Remove '+positions[idx].name+'?'))return;
  positions.splice(idx,1); save(); renderAll();
}

function addPos() {
  const tick=document.getElementById('a-tick').value.trim().toUpperCase();
  const name=document.getElementById('a-name').value.trim();
  const shares=parseFloat(document.getElementById('a-shares').value);
  const cost=parseFloat(document.getElementById('a-cost').value);
  const acct=document.getElementById('a-acct').value;
  const type=document.getElementById('a-type').value;
  const err=document.getElementById('a-err');
  if(!name){err.textContent='Enter a name.';err.style.display='block';return;}
  if(isNaN(shares)||shares<=0){err.textContent='Enter valid shares.';err.style.display='block';return;}
  if(isNaN(cost)||cost<=0){err.textContent='Enter valid cost.';err.style.display='block';return;}
  err.style.display='none';
  const now=new Date();
  const ds=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  positions.push({id:'u'+Date.now(),name,ticker:type==='option'?null:tick,account:acct,shares,costBasis:cost,currentPrice:cost,type,addedDate:ds,closed:false});
  save(); renderAll();
  ['a-tick','a-name','a-shares','a-cost'].forEach(id=>document.getElementById(id).value='');
}

async function fetchFH(ticker) {
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FH}`);
  const d=await r.json();
  if(!d?.c||d.c===0)throw new Error('No FH price');
  return {price:d.c,source:'Finnhub'};
}

async function fetchAV(ticker) {
  const r=await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${AV}`);
  const d=await r.json();
  if(d?.Information)throw new Error('AV limit');
  const p=parseFloat(d?.['Global Quote']?.['05. price']);
  if(isNaN(p))throw new Error('No AV price');
  return {price:p,source:'Alpha Vantage'};
}

async function fetchPrice(ticker) {
  try { return await fetchFH(ticker); }
  catch { try { return await fetchAV(ticker); } catch { throw new Error('Both failed: '+ticker); } }
}

async function fetchAll() {
  const btn=document.getElementById('rbtn');
  const st=document.getElementById('stext');
  const eb=document.getElementById('ebox');
  btn.disabled=true; eb.style.display='none';
  const stocks=positions.filter(p=>p.type==='stock'&&p.ticker&&!p.closed);
  if(!stocks.length){st.textContent='No open stock positions.';btn.disabled=false;return;}
  let failed=[],sources=new Set();
  for(let i=0;i<stocks.length;i++){
    const p=stocks[i];
    st.textContent='Fetching '+p.ticker+'... ('+(i+1)+'/'+stocks.length+')';
    try{
      const {price,source}=await fetchPrice(p.ticker);
      positions[positions.indexOf(p)].currentPrice=price;
      sources.add(source);
    } catch { failed.push(p.ticker); }
  }
  save(); renderAll();
  const now=new Date();
  st.textContent='Updated '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' via '+[...sources].join(' + ');
  document.getElementById('pos-label').textContent='Open positions — updated '+now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(failed.length){eb.textContent='Could not fetch: '+failed.join(', ')+'. Update manually.';eb.style.display='block';}
  btn.disabled=false;
}

renderAll();
</script>
</body>
</html>
