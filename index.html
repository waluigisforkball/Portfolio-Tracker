<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; padding: 16px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #73726c; margin-bottom: 20px; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  @media (min-width: 500px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .metric { background: #fff; border-radius: 10px; padding: 12px; border: 0.5px solid rgba(0,0,0,0.1); }
  .metric-label { font-size: 11px; color: #73726c; margin-bottom: 4px; }
  .metric-val { font-size: 18px; font-weight: 500; }
  .pos { color: #3B6D11; } .neg { color: #A32D2D; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; margin-bottom: 8px; border-left: 3px solid #d3d1c7; }
  .card.gain { border-left-color: #3B6D11; }
  .card.loss { border-left-color: #A32D2D; }
  .card.flat { border-left-color: #b4b2a9; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 11px; color: #73726c; margin-top: 2px; }
  .card-pnl { text-align: right; }
  .card-pnl-val { font-size: 15px; font-weight: 500; }
  .card-pnl-pct { font-size: 12px; margin-top: 2px; }
  .card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stat-label { font-size: 11px; color: #73726c; }
  .stat-val { font-size: 12px; color: #444441; margin-top: 2px; }
  .remove-btn { font-size: 11px; color: #A32D2D; background: none; border: none; cursor: pointer; padding: 0; margin-top: 8px; }
  .section { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: #3d3d3a; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: #73726c; }
  input, select { font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a18; outline: none; }
  input:focus, select:focus { border-color: rgba(0,0,0,0.4); }
  .input-sm { width: 90px; }
  .input-md { width: 120px; }
  .input-lg { width: 160px; }
  button { font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a18; cursor: pointer; }
  button:hover { background: #f5f5f0; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn-primary:hover { background: #3d3d3a; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .status { font-size: 12px; color: #73726c; }
  .error { font-size: 12px; color: #A32D2D; background: #FCEBEB; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
  .positions-label { font-size: 12px; color: #73726c; margin-bottom: 8px; }
  .empty-state { font-size: 13px; color: #73726c; text-align: center; padding: 24px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: #f1efe8; color: #5f5e5a; margin-left: 6px; vertical-align: middle; }
  .tag.opt { background: #FAEEDA; color: #854F0B; }
  .tag.rh { background: #E6F1FB; color: #185FA5; }
  .tag.ml { background: #EAF3DE; color: #3B6D11; }
  .opt-note { font-size: 11px; color: #73726c; margin-top: 3px; }
  .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.08); margin: 12px 0; }
</style>
</head>
<body>

<h1>Portfolio tracker</h1>
<p class="subtitle">Live prices via Alpha Vantage &middot; Positions saved locally</p>

<div class="summary-grid">
  <div class="metric"><div class="metric-label">Total invested</div><div class="metric-val" id="t-invested">—</div></div>
  <div class="metric"><div class="metric-label">Current value</div><div class="metric-val" id="t-value">—</div></div>
  <div class="metric"><div class="metric-label">Gain / loss</div><div class="metric-val" id="t-pnl">—</div></div>
  <div class="metric"><div class="metric-label">Return</div><div class="metric-val" id="t-pct">—</div></div>
</div>

<div class="toolbar">
  <button class="btn-primary" id="refresh-btn" onclick="fetchAllPrices()">Refresh live prices</button>
  <span class="status" id="status-text">Not yet refreshed</span>
</div>

<div class="error" id="error-box"></div>

<div id="positions-wrap">
  <div class="positions-label" id="pos-label">Your positions</div>
  <div id="positions-list"></div>
</div>

<hr class="divider" style="margin: 20px 0;">

<div class="section">
  <div class="section-title">Add a position</div>
  <div class="form-row">
    <div class="form-group">
      <label>Ticker</label>
      <input class="input-sm" id="add-ticker" type="text" placeholder="e.g. AAPL" maxlength="8" />
    </div>
    <div class="form-group">
      <label>Name</label>
      <input class="input-lg" id="add-name" type="text" placeholder="e.g. Apple Inc." />
    </div>
    <div class="form-group">
      <label>Shares</label>
      <input class="input-sm" id="add-shares" type="number" step="0.0001" placeholder="0.00" />
    </div>
    <div class="form-group">
      <label>Cost basis / share</label>
      <input class="input-sm" id="add-cost" type="number" step="0.01" placeholder="$0.00" />
    </div>
    <div class="form-group">
      <label>Account</label>
      <select id="add-account">
        <option>Merrill Edge IRA</option>
        <option>Robinhood</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="add-type">
        <option value="stock">Stock / ETF</option>
        <option value="option">Option (manual price)</option>
      </select>
    </div>
    <div class="form-group" style="justify-content: flex-end;">
      <button class="btn-primary" onclick="addPosition()">Add</button>
    </div>
  </div>
  <div id="add-error" style="font-size:12px;color:#A32D2D;margin-top:8px;display:none;"></div>
</div>

<div class="section" id="opt-section" style="display:none;">
  <div class="section-title">Update option prices manually</div>
  <div id="opt-inputs"></div>
</div>

<script>
const API_KEY = 'GC12FPL30GNZKUD8';
const STORAGE_KEY = 'portfolio_positions_v2';

const DEFAULT_POSITIONS = [
  { id: 'DAL', name: 'Delta Air Lines', ticker: 'DAL', account: 'Merrill Edge IRA', shares: 4, costBasis: 65.94, currentPrice: 65.94, type: 'stock', addedDate: 'Apr 7, 2026' },
  { id: 'JETS', name: 'US Global Jets ETF', ticker: 'JETS', account: 'Merrill Edge IRA', shares: 14, costBasis: 24.67, currentPrice: 24.67, type: 'stock', addedDate: 'Apr 7, 2026' },
  { id: 'IVV', name: 'iShares Core S&P 500', ticker: 'IVV', account: 'Merrill Edge IRA', shares: 2, costBasis: 659.67, currentPrice: 659.67, type: 'stock', addedDate: 'Apr 7, 2026' },
  { id: 'QQQ', name: 'Invesco QQQ', ticker: 'QQQ', account: 'Robinhood', shares: 0.342393, costBasis: 584.12, currentPrice: 584.12, type: 'stock', addedDate: 'Apr 7, 2026' },
  { id: 'CCL_OPT', name: 'CCL $27.50 Call 4/24', ticker: null, account: 'Robinhood', shares: 1, costBasis: 48.00, currentPrice: 48.00, type: 'option', addedDate: 'Apr 7, 2026' }
];

function loadPositions() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : DEFAULT_POSITIONS;
  } catch { return DEFAULT_POSITIONS; }
}

function savePositions(positions) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); } catch {}
}

let positions = loadPositions();

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtSigned(n) { return (n >= 0 ? '+$' : '-$') + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function fmtShares(p) {
  if (p.type === 'option') return '1 contract';
  return p.shares % 1 !== 0 ? p.shares.toFixed(4) + ' sh' : p.shares + ' sh';
}

function renderAll() {
  const list = document.getElementById('positions-list');
  if (positions.length === 0) {
    list.innerHTML = '<div class="empty-state">No positions yet. Add one below.</div>';
    document.getElementById('t-invested').textContent = '—';
    document.getElementById('t-value').textContent = '—';
    document.getElementById('t-pnl').textContent = '—';
    document.getElementById('t-pct').textContent = '—';
    return;
  }

  let totalInvested = 0, totalValue = 0;

  list.innerHTML = positions.map((p, i) => {
    const invested = p.type === 'option' ? p.costBasis : p.shares * p.costBasis;
    const value = p.type === 'option' ? p.currentPrice : p.shares * p.currentPrice;
    const pnl = value - invested;
    const pct = (pnl / invested) * 100;
    totalInvested += invested;
    totalValue += value;

    const gainClass = Math.abs(pnl) < 0.005 ? 'flat' : pnl >= 0 ? 'gain' : 'loss';
    const pnlColor = pnl >= 0 ? '#3B6D11' : '#A32D2D';
    const acctTag = p.account === 'Robinhood' ? 'rh' : p.account === 'Merrill Edge IRA' ? 'ml' : '';
    const typeTag = p.type === 'option' ? '<span class="tag opt">option</span>' : '';
    const acctTagHtml = acctTag ? `<span class="tag ${acctTag}">${p.account}</span>` : `<span class="tag">${p.account}</span>`;

    return `<div class="card ${gainClass}">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name} <span style="font-size:12px;font-weight:400;color:#73726c">${p.ticker || 'OPT'}</span>${typeTag}</div>
          <div class="card-sub">${acctTagHtml} &middot; Added ${p.addedDate}</div>
          ${p.type === 'option' ? '<div class="opt-note">Update price manually in options section below</div>' : ''}
        </div>
        <div class="card-pnl">
          <div class="card-pnl-val" style="color:${pnlColor}">${fmtSigned(pnl)}</div>
          <div class="card-pnl-pct" style="color:${pnlColor}">${fmtPct(pct)}</div>
        </div>
      </div>
      <div class="card-stats">
        <div><div class="stat-label">Shares</div><div class="stat-val">${fmtShares(p)}</div></div>
        <div><div class="stat-label">Cost basis</div><div class="stat-val">${p.type === 'option' ? fmt(p.costBasis) + ' paid' : fmt(p.costBasis) + ' / sh'}</div></div>
        <div><div class="stat-label">Current</div><div class="stat-val">${p.type === 'option' ? fmt(p.currentPrice) : fmt(p.currentPrice) + ' / sh'}</div></div>
        <div><div class="stat-label">Total value</div><div class="stat-val">${fmt(value)}</div></div>
      </div>
      <button class="remove-btn" onclick="removePosition(${i})">Remove position</button>
    </div>`;
  }).join('');

  const totalPnl = totalValue - totalInvested;
  const totalPct = (totalPnl / totalInvested) * 100;
  const pnlClass = totalPnl >= 0 ? 'pos' : 'neg';

  document.getElementById('t-invested').textContent = fmt(totalInvested);
  document.getElementById('t-value').textContent = fmt(totalValue);
  document.getElementById('t-pnl').className = 'metric-val ' + pnlClass;
  document.getElementById('t-pnl').textContent = fmtSigned(totalPnl);
  document.getElementById('t-pct').className = 'metric-val ' + pnlClass;
  document.getElementById('t-pct').textContent = fmtPct(totalPct);

  renderOptionInputs();
}

function renderOptionInputs() {
  const opts = positions.filter(p => p.type === 'option');
  const section = document.getElementById('opt-section');
  if (opts.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  document.getElementById('opt-inputs').innerHTML = opts.map((p, _) => {
    const idx = positions.indexOf(p);
    return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
      <span style="font-size:13px;min-width:160px;">${p.name}</span>
      <input type="number" step="0.01" placeholder="New contract value $" style="font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);width:160px;" id="opt-val-${idx}" />
      <button onclick="updateOption(${idx})" style="font-size:13px;padding:6px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);cursor:pointer;">Update</button>
      <span style="font-size:12px;color:#73726c;">Currently: ${fmt(p.currentPrice)}</span>
    </div>`;
  }).join('');
}

function updateOption(idx) {
  const val = parseFloat(document.getElementById('opt-val-' + idx).value);
  if (isNaN(val) || val < 0) return;
  positions[idx].currentPrice = val;
  savePositions(positions);
  renderAll();
}

function removePosition(idx) {
  if (!confirm('Remove ' + positions[idx].name + '?')) return;
  positions.splice(idx, 1);
  savePositions(positions);
  renderAll();
}

function addPosition() {
  const ticker = document.getElementById('add-ticker').value.trim().toUpperCase();
  const name = document.getElementById('add-name').value.trim();
  const shares = parseFloat(document.getElementById('add-shares').value);
  const cost = parseFloat(document.getElementById('add-cost').value);
  const account = document.getElementById('add-account').value;
  const type = document.getElementById('add-type').value;
  const errEl = document.getElementById('add-error');

  if (!name) { errEl.textContent = 'Please enter a name.'; errEl.style.display = 'block'; return; }
  if (isNaN(shares) || shares <= 0) { errEl.textContent = 'Please enter valid shares.'; errEl.style.display = 'block'; return; }
  if (isNaN(cost) || cost <= 0) { errEl.textContent = 'Please enter valid cost basis.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const id = type === 'option' ? ticker + '_OPT_' + Date.now() : ticker;

  positions.push({
    id, name,
    ticker: type === 'option' ? null : ticker,
    account, shares, costBasis: cost,
    currentPrice: cost,
    type, addedDate: dateStr
  });

  savePositions(positions);
  renderAll();

  document.getElementById('add-ticker').value = '';
  document.getElementById('add-name').value = '';
  document.getElementById('add-shares').value = '';
  document.getElementById('add-cost').value = '';
}

async function fetchSingle(ticker) {
  const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  const price = parseFloat(data?.['Global Quote']?.['05. price']);
  if (isNaN(price)) throw new Error('No price for ' + ticker);
  return price;
}

async function fetchAllPrices() {
  const btn = document.getElementById('refresh-btn');
  const status = document.getElementById('status-text');
  const errBox = document.getElementById('error-box');
  btn.disabled = true;
  errBox.style.display = 'none';

  const stockPositions = positions.filter(p => p.type === 'stock' && p.ticker);
  if (stockPositions.length === 0) {
    status.textContent = 'No stock positions to refresh.';
    btn.disabled = false;
    return;
  }

  status.textContent = 'Fetching ' + stockPositions.length + ' prices...';

  let failed = [];
  for (let i = 0; i < stockPositions.length; i++) {
    const p = stockPositions[i];
    status.textContent = 'Fetching ' + p.ticker + '... (' + (i+1) + '/' + stockPositions.length + ')';
    try {
      const price = await fetchSingle(p.ticker);
      const idx = positions.indexOf(p);
      positions[idx].currentPrice = price;
      await new Promise(r => setTimeout(r, 1200));
    } catch {
      failed.push(p.ticker);
    }
  }

  savePositions(positions);
  renderAll();

  const now = new Date();
  status.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  document.getElementById('pos-label').textContent = 'Your positions — updated ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  if (failed.length > 0) {
    errBox.textContent = 'Could not fetch: ' + failed.join(', ') + '. Free tier allows 25 requests/day.';
    errBox.style.display = 'block';
  }

  btn.disabled = false;
}

renderAll();
</script>
</body>
</html>
